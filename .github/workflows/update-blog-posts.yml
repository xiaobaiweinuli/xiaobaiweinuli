name: Update Blog Posts in README

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 时间 2:00
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests xmltodict
        
    - name: Update blog posts
      run: python .github/scripts/update_blog_posts.py
      
    - name: Commit and push changes
      run: |
        git config --local user.email "1613589162@qq.com"
        git config --local user.name "xiaobaiweinuli"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: update blog posts [skip ci]"
        git push