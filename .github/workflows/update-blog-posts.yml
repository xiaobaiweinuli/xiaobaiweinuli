name: Update Blog Posts in README

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Fetch Atom feed
      uses: actions-hub/rss@1.0
      id: rss
      with:
        url: https://blog.xingshuang.xyz/atom.xml
        limit: 5
        
    - name: Process and update README
      uses: actions/github-script@v7
      env:
        RSS_ITEMS: ${{ steps.rss.outputs.items }}
      with:
        script: |
          const items = JSON.parse(process.env.RSS_ITEMS || '[]');
          
          // 生成博客内容
          let blogContent = '';
          items.forEach(item => {
            const date = new Date(item.pubDate).toISOString().split('T')[0];
            const title = item.title.replace(/[\[\]]/g, '');
            blogContent += `${date}-[${title}](${item.link})\n`;
          });
          
          // 读取和更新 README
          const fs = require('fs');
          let readmeContent = fs.readFileSync('README.md', 'utf8');
          
          const startMarker = '<!-- BLOG_POSTS_START -->';
          const endMarker = '<!-- BLOG_POSTS_END -->';
          const newSection = `${startMarker}\n${blogContent}${endMarker}`;
          const regex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);
          
          if (readmeContent.match(regex)) {
            readmeContent = readmeContent.replace(regex, newSection);
          } else {
            readmeContent += `\n\n${newSection}\n`;
          }
          
          fs.writeFileSync('README.md', readmeContent);
          
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: update blog posts [skip ci]"
        git push