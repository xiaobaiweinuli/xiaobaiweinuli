name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
      # 使用正确的日期格式：MM 表示月份（大写 MM），mm 在此 Action 中会被解析为分钟
          date_format: "UTC: yyyy年MM月dd日"
      # 自动清理标题中的竖线和首尾空格 —— 用单行字符串并对反斜杠进行转义，确保 item_exec 正确传入并执行
          item_exec: "post.title = post.title.replace(/\\|/g, '').trim()"
      # 模板末尾放两个换行，确保条目之间有空行，避免行首合并在同一行的问题
          template: "✨📅 $date - [$title]($url)$newline$newline"