name: 更新最新博客文章

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0 点执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 不使用 date_format，改用 item_exec 解析 ISO 日期
          item_exec: |
            const d = new Date(post.published);
            const yyyy = d.getUTCFullYear();
            const MM = String(d.getUTCMonth() + 1).padStart(2, '0'); // 月份要 +1
            const dd = String(d.getUTCDate()).padStart(2, '0');
            post.date = `${yyyy}年${MM}月${dd}日`;
            post.title = (post.title || '').replace(/<[^>]+>/g, '').replace(/\|/g, '').trim();
          template: "$newline✨📅 $date - [$title]($url) \n $newline"