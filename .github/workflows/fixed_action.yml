name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 使用 published 字段而不是 updated 字段
          feed_date_field: "published"
          # 简化日期格式，避免时区问题
          date_format: "yyyy年MM月dd日"
          # 清理标题
          item_exec: |
            post.title = (post.title || '').replace(/<[^>]+>/g, '').replace(/\|/g, '').trim();
            // 确保日期正确解析
            if (post.published) {
              const date = new Date(post.published);
              if (!isNaN(date.getTime())) {
                post.date = date.getFullYear() + '年' + 
                           String(date.getMonth() + 1).padStart(2, '0') + '月' + 
                           String(date.getDate()).padStart(2, '0') + '日';
              }
            }
          # 模板
          template: "$newline✨📅 $date - [$title]($url)$newline"