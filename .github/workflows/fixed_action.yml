name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 修正模板：使用 $newline 确保每篇文章后有换行，同时保证链接格式正确
          template: "✨📅 $date - [$title]($url)$newline"
          # 修正日期格式：使用正确的月份占位符 'MM'
          date_format: "yyyy年MM月dd日"
          # 修正 item_exec：使用 item.title 变量，移除标题末尾的 | 字符，确保链接正确解析
          item_exec: "item.title = item.title.replace(/\\|$/, '');"
