name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 修正模板：使用 $newline 确保每篇文章后有换行，同时保证链接格式正确
          template: "✨📅 $date - [$title]($url)$newline"
          # 保持原样，但将通过 item_exec 覆盖日期
          date_format: "yyyy年MM月dd日"
          # 最终修正 item_exec：
          # 1. 移除标题末尾的 | 字符和所有空白字符，确保链接正确解析
          # 2. 强制修正日期格式，使用 item.date 的月份和日期，以绕过 date_format 的错误
          item_exec: |
            item.title = item.title.replace(/\\s*\\|\\s*$/, '');
            // 强制修正日期格式：从 item.date (Date对象) 中提取正确的月份和日期
            const date = new Date(item.date);
            const year = date.getFullYear();
            // getMonth() 返回 0-11，所以需要 +1
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            item.date = `${year}年${month}月${day}日`;
