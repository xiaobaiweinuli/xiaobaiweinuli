name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 修复模板：确保正确的Markdown格式，并移除多余的换行符
          template: "✨📅 $date - [$title]($url)"
          # 修复日期格式：使用正确的月份占位符 'MM'，并添加换行符
          date_format: "yyyy年MM月dd日\n"
          # 修复换行符：使用 post_list_separator 替代 template 中的 \n $newline
          post_list_separator: "\n"
          # 确保链接正确解析：添加 item_exec 选项，移除标题末尾的 | 字符
          item_exec: "title = title.replace(/\\|$/, '');"
