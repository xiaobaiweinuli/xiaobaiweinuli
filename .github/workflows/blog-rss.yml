name: 更新
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          retry_count: 3
          retry_wait_time: 5
          custom_tags: "publishedTime/published/,updatedTime/updated/"
          item_exec: "post.title = (post.title || '').replace(/<[^>]+>/g, '').replace(/\\|/g, '').trim(); function formatDate(dateStr) { if (!dateStr) return ''; const d = new Date(dateStr); const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0'); const hours = String(d.getHours()).padStart(2, '0'); const minutes = String(d.getMinutes()).padStart(2, '0'); const seconds = String(d.getSeconds()).padStart(2, '0'); return year + '年' + month + '月' + day + '日 ' + hours + ':' + minutes + ':' + seconds; } post.publishedTime = formatDate(post.publishedTime); post.updatedTime = formatDate(post.updatedTime);"
          template: "$newline<details>$newline<summary>📌 <b><a href=\"$url\">$title</a></b></summary>$newline$newline- 📅 发布时间: $publishedTime$newline- 🔄 更新时间: $updatedTime$newline</details>$newline"
