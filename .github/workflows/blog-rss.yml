name: 更新最新博客文章
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: 更新 README 中的最新博客文章
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 更新博客文章列表
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.xingshuang.xyz/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "🤖 自动更新博客文章列表"
          max_post_count: 5
          # 使用正确的月份 token（MM），并使用 UTC 前缀以固定时区
          date_format: "UTC: yyyy年MM月dd日"
          # 更稳健的清理：去除 HTML 标签、清理竖线并 trim（注意反斜杠需要在 YAML 双引号中转义）
          item_exec: "post.title = (post.title || '').replace(/<[^>]+>/g, '').replace(/\\|/g, '').trim()"
          # 模板以 $newline 开头，确保条目在注释标签后单独成行；条目后加 $newline 以分隔条目
          template: "$newline✨📅[$title]($url) \n $newline"
